name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Set environment variables for Spring Boot
        run: |
          echo "MYSQL_USERNAME=root" >> $GITHUB_ENV
          echo "MYSQL_PASSWORD=rootpass" >> $GITHUB_ENV
          echo "MYSQL_DB_NAME=task_management_app_db" >> $GITHUB_ENV

      - name: Check MySQL container status
        run: |
          docker ps -a

      - name: Show MySQL container logs
        run: |
          docker logs mysql

      - name: Wait for MySQL to be ready
        run: |
          until docker exec mysql mysqladmin --user=root --password=rootpass --host=localhost --port=3306 ping --silent; do
            echo "Waiting for MySQL..."
            sleep 10
          done
        continue-on-error: true

      - name: Build and verify
        run: mvn clean verify
